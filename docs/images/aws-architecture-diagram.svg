<rect x="710" y="110" width="420" height="510" rx="18" fill="#eff6ff" stroke="#2580b8" stroke-width="3"/>
<rect x="710" y="110" width="420" height="52" rx="18" fill="#2580b8"/><text x="920" y="144" text-anchor="middle" class="head">ML TRIAGE &amp; DASHBOARD</text>
<rect x="755" y="220" width="150" height="90" rx="14" fill="white" stroke="#2563eb" stroke-width="2"/><text x="830" y="255" text-anchor="middle" class="label">Jupyter /</text><text x="830" y="279" text-anchor="middle" class="label">SageMaker</text><text x="830" y="300" text-anchor="middle" class="small">Model training</text>
<rect x="945" y="220" width="150" height="90" rx="14" fill="white" stroke="#2563eb" stroke-width="2"/><text x="1020" y="255" text-anchor="middle" class="label">XGBoost</text><text x="1020" y="279" text-anchor="middle" class="small">Natural vs balanced</text><text x="1020" y="300" text-anchor="middle" class="small">sampling</text>
<rect x="755" y="385" width="340" height="105" rx="14" fill="white" stroke="#2563eb" stroke-width="2"/><text x="925" y="420" text-anchor="middle" class="label">Streamlit Security Dashboard</text><text x="925" y="449" text-anchor="middle" class="small">Attack trends • targeted ports • predictions</text><text x="925" y="474" text-anchor="middle" class="small">Original hosting: Cloud9 on EC2</text>
<rect x="755" y="525" width="340" height="65" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/><text x="925" y="553" text-anchor="middle" class="label">Model tradeoff</text><text x="925" y="577" text-anchor="middle" class="small">Natural: 97.5% accuracy | Balanced: 0.79 macro F1</text>

