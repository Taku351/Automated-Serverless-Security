<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
<defs>
  <style>
    .title{font:700 32px Arial;fill:#111827}.head{font:700 20px Arial;fill:white}.label{font:600 17px Arial;fill:#111827}.small{font:14px Arial;fill:#374151}.note{font:13px Arial;fill:#4b5563}.arrow{stroke:#374151;stroke-width:3;fill:none;marker-end:url(#m)}
  </style>
  <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker>
</defs>
<rect width="1400" height="760" fill="#f8fafc"/>
<text x="700" y="48" text-anchor="middle" class="title">Cybersecurity Data Lake Architecture with ML Triage</text>

<!-- Sources -->
