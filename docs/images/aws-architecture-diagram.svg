<rect x="1170" y="205" width="195" height="210" rx="18" fill="#fdf2f8" stroke="#be185d" stroke-width="3"/>
<rect x="1170" y="205" width="195" height="48" rx="18" fill="#be185d"/><text x="1267" y="237" text-anchor="middle" class="head">MONITORING</text>
<text x="1267" y="300" text-anchor="middle" class="label">CloudWatch Logs</text><text x="1267" y="330" text-anchor="middle" class="small">Access • errors</text><text x="1267" y="354" text-anchor="middle" class="small">threat events</text><text x="1267" y="390" text-anchor="middle" class="small">Optional S3 archive</text>

