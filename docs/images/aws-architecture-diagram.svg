<text x="125" y="320" text-anchor="middle" class="label">Network Telemetry</text><text x="125" y="348" text-anchor="middle" class="small">Educational log files</text><text x="125" y="372" text-anchor="middle" class="small">Internal / lab sources</text>

<!-- Data lake -->
<rect x="250" y="110" width="410" height="510" rx="18" fill="#ecfdf5" stroke="#3f8f29" stroke-width="3"/>
<rect x="250" y="110" width="410" height="52" rx="18" fill="#3f8f29"/><text x="455" y="144" text-anchor="middle" class="head">DATA INGESTION &amp; QUERY</text>
<rect x="290" y="235" width="150" height="90" rx="14" fill="white" stroke="#65a30d" stroke-width="2"/><text x="365" y="270" text-anchor="middle" class="label">Amazon S3</text><text x="365" y="296" text-anchor="middle" class="small">Raw telemetry zone</text>
<rect x="475" y="235" width="150" height="90" rx="14" fill="white" stroke="#7c3aed" stroke-width="2"/><text x="550" y="270" text-anchor="middle" class="label">AWS Glue</text><text x="550" y="296" text-anchor="middle" class="small">Crawler</text>
<rect x="475" y="390" width="150" height="90" rx="14" fill="white" stroke="#7c3aed" stroke-width="2"/><text x="550" y="425" text-anchor="middle" class="label">Glue Catalog</text><text x="550" y="451" text-anchor="middle" class="small">Schemas &amp; tables</text>
<rect x="290" y="390" width="150" height="90" rx="14" fill="white" stroke="#7c3aed" stroke-width="2"/><text x="365" y="425" text-anchor="middle" class="label">Athena</text><text x="365" y="451" text-anchor="middle" class="small">Serverless SQL</text>
<rect x="290" y="515" width="335" height="65" rx="14" fill="white" stroke="#65a30d" stroke-width="2"/><text x="457" y="545" text-anchor="middle" class="label">S3 Results / Processed Zones</text><text x="457" y="568" text-anchor="middle" class="small">Athena output, model assets, optional archives</text>

